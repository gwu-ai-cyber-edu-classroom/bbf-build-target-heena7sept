<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Preview — {{ name }}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    a { color: #06c; }
    pre { background: #f7f7f7; padding: 1rem; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; }
    img { max-width: 100%; border: 1px solid #eee; border-radius: 8px; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <p><a href="{{ url_for('index') }}">&larr; back to files</a></p>
  <h1>{{ name }}</h1>
  <p class="muted">owner: {{ meta.owner }} &middot; {{ meta.size }} bytes</p>

  {% if kind == "image" %}
    <img src="{{ url_for('preview', name=name) }}?raw=1" alt="{{ name }}">
  {% elif kind == "text" %}
    <pre>{{ body }}</pre>
  {% else %}
    <p>No inline preview for this file type.</p>
    <p><a href="{{ url_for('preview', name=name) }}?raw=1">Download {{ name }}</a></p>
  {% endif %}
</body>
</html>
